<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间戳转换工具 - 许先生的工具箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .back-btn {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .main-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .converter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .converter-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #e9ecef;
        }

        .converter-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.95em;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .result-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .result-label {
            font-size: 0.85em;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 1.3em;
            font-weight: 600;
            word-break: break-all;
        }

        .current-time {
            background: #e8f4fd;
            border: 2px solid #0066cc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .current-time h3 {
            color: #0066cc;
            margin-bottom: 15px;
        }

        .time-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .time-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        .time-item-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .time-item-value {
            color: #333;
            font-size: 1.2em;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .quick-times {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .quick-times h4 {
            color: #856404;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .quick-times-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
        }

        .quick-btn {
            padding: 8px 12px;
            background: white;
            border: 2px solid #ffc107;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
            text-align: center;
        }

        .quick-btn:hover {
            background: #ffc107;
            color: white;
        }

        /* 📱 移动端适配 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header h1 { font-size: 1.8em; }
            .main-content { padding: 20px; }
            .converter-grid { grid-template-columns: 1fr; }
            .time-display { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.5em; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="../../index.html" class="back-btn">← 返回工具箱</a>
            <h1>⏰ 时间戳转换</h1>
            <p>时间戳与日期时间互转，支持多种格式</p>
        </div>

        <div class="main-content">
            <!-- 当前时间 -->
            <div class="current-time">
                <h3>🕐 当前时间</h3>
                <div class="time-display">
                    <div class="time-item">
                        <div class="time-item-label">时间戳（秒）</div>
                        <div class="time-item-value" id="currentSeconds">0</div>
                    </div>
                    <div class="time-item">
                        <div class="time-item-label">时间戳（毫秒）</div>
                        <div class="time-item-value" id="currentMillis">0</div>
                    </div>
                    <div class="time-item">
                        <div class="time-item-label">北京时间</div>
                        <div class="time-item-value" id="currentTime">--</div>
                    </div>
                </div>
            </div>

            <!-- 转换器 -->
            <div class="converter-grid">
                <!-- 时间戳转日期 -->
                <div class="converter-card">
                    <h3>📅 时间戳 → 日期时间</h3>
                    <div class="input-group">
                        <label>时间戳</label>
                        <input type="text" id="timestampInput" placeholder="1711008000 或 1711008000000">
                    </div>
                    <div class="input-group">
                        <label>单位</label>
                        <select id="timestampUnit" onchange="convertTimestamp()">
                            <option value="auto">自动识别</option>
                            <option value="seconds">秒（10 位）</option>
                            <option value="millis">毫秒（13 位）</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>时区</label>
                        <select id="timezone" onchange="convertTimestamp()">
                            <option value="8">北京时间 (UTC+8)</option>
                            <option value="0">UTC 时间 (UTC+0)</option>
                            <option value="-5">美东时间 (UTC-5)</option>
                            <option value="-8">美西时间 (UTC-8)</option>
                            <option value="9">日本时间 (UTC+9)</option>
                        </select>
                    </div>
                    <div class="result-box">
                        <div class="result-label">📝 日期时间</div>
                        <div class="result-value" id="dateResult">请输入时间戳</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="copyResult('dateResult')">📋 复制</button>
                        <button class="btn btn-secondary" onclick="fillCurrentTimestamp()">⏰ 当前时间戳</button>
                    </div>
                </div>

                <!-- 日期转时间戳 -->
                <div class="converter-card">
                    <h3>🕐 日期时间 → 时间戳</h3>
                    <div class="input-group">
                        <label>日期时间</label>
                        <input type="datetime-local" id="dateInput" onchange="convertDate()">
                    </div>
                    <div class="input-group">
                        <label>时区</label>
                        <select id="dateToTimestampTimezone" onchange="convertDate()">
                            <option value="8">北京时间 (UTC+8)</option>
                            <option value="0">UTC 时间 (UTC+0)</option>
                            <option value="-5">美东时间 (UTC-5)</option>
                            <option value="-8">美西时间 (UTC-8)</option>
                            <option value="9">日本时间 (UTC+9)</option>
                        </select>
                    </div>
                    <div class="result-box">
                        <div class="result-label">🔢 时间戳（秒）</div>
                        <div class="result-value" id="timestampResult">请选择日期</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="copyResult('timestampResult')">📋 复制</button>
                        <button class="btn btn-secondary" onclick="fillCurrentDate()">⏰ 当前时间</button>
                    </div>
                </div>
            </div>

            <!-- 快捷时间 -->
            <div class="quick-times">
                <h4>⚡ 快捷时间</h4>
                <div class="quick-times-grid">
                    <div class="quick-btn" onclick="fillCustomDate(0)">今天</div>
                    <div class="quick-btn" onclick="fillCustomDate(1)">明天</div>
                    <div class="quick-btn" onclick="fillCustomDate(7)">7 天后</div>
                    <div class="quick-btn" onclick="fillCustomDate(30)">30 天后</div>
                    <div class="quick-btn" onclick="fillCustomDate(-1)">昨天</div>
                    <div class="quick-btn" onclick="fillCustomDate(-7)">7 天前</div>
                    <div class="quick-btn" onclick="fillCustomDate(-30)">30 天前</div>
                    <div class="quick-btn" onclick="fillCustomDate(365)">1 年后</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 更新当前时间
        function updateCurrentTime() {
            const now = new Date();
            const seconds = Math.floor(now.getTime() / 1000);
            const millis = now.getTime();
            
            document.getElementById('currentSeconds').textContent = seconds;
            document.getElementById('currentMillis').textContent = millis;
            document.getElementById('currentTime').textContent = formatDateTime(now);
        }

        // 格式化日期时间
        function formatDateTime(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // 时间戳转日期
        function convertTimestamp() {
            const input = document.getElementById('timestampInput').value.trim();
            const resultDiv = document.getElementById('dateResult');
            const unit = document.getElementById('timestampUnit').value;
            const timezone = parseInt(document.getElementById('timezone').value);

            if (!input) {
                resultDiv.textContent = '请输入时间戳';
                return;
            }

            let timestamp = parseInt(input);
            
            if (isNaN(timestamp)) {
                resultDiv.textContent = '❌ 无效的时间戳';
                return;
            }

            // 自动识别单位
            if (unit === 'auto') {
                if (input.length === 10) {
                    timestamp *= 1000; // 秒转毫秒
                } else if (input.length === 13) {
                    // 已经是毫秒
                } else if (input.length === 16) {
                    timestamp = Math.floor(timestamp / 1000); // 微秒转毫秒
                } else {
                    resultDiv.textContent = '❌ 无法识别时间戳单位，请手动选择';
                    return;
                }
            } else if (unit === 'seconds') {
                timestamp *= 1000;
            }

            // 应用时区偏移
            const utcTime = new Date(timestamp);
            const localTime = new Date(utcTime.getTime() + timezone * 3600000);

            resultDiv.textContent = formatDateTime(localTime) + ` (UTC${timezone >= 0 ? '+' : ''}${timezone})`;
        }

        // 日期转时间戳
        function convertDate() {
            const input = document.getElementById('dateInput').value;
            const resultDiv = document.getElementById('timestampResult');
            const timezone = parseInt(document.getElementById('dateToTimestampTimezone').value);

            if (!input) {
                resultDiv.textContent = '请选择日期';
                return;
            }

            const date = new Date(input);
            
            // 应用时区偏移
            const utcTime = date.getTime() - timezone * 3600000;
            const seconds = Math.floor(utcTime / 1000);
            const millis = utcTime;

            resultDiv.textContent = `${seconds} 秒\n(${millis} 毫秒)`;
        }

        // 复制结果
        function copyResult(elementId) {
            const text = document.getElementById(elementId).textContent;
            if (text === '请输入时间戳' || text === '请选择日期' || text.includes('❌')) {
                alert('请先输入有效的值');
                return;
            }

            navigator.clipboard.writeText(text.replace('\n', ' ')).then(() => {
                showToast('✅ 已复制');
            }).catch(err => {
                alert('复制失败：' + err);
            });
        }

        // 填充当前时间戳
        function fillCurrentTimestamp() {
            const seconds = Math.floor(Date.now() / 1000);
            document.getElementById('timestampInput').value = seconds;
            convertTimestamp();
        }

        // 填充当前日期
        function fillCurrentDate() {
            const now = new Date();
            const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
            document.getElementById('dateInput').value = local.toISOString().slice(0, 16);
            convertDate();
        }

        // 填充自定义日期
        function fillCustomDate(days) {
            const now = new Date();
            now.setDate(now.getDate() + days);
            const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
            document.getElementById('dateInput').value = local.toISOString().slice(0, 16);
            convertDate();
        }

        // 提示框
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 20px 30px;
                border-radius: 10px;
                font-size: 1.1em;
                z-index: 1000;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // 初始化
        updateCurrentTime();
        setInterval(updateCurrentTime, 1000);
    </script>
</body>
</html>
