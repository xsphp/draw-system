<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码生成器 - 许先生的工具箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .back-btn {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .main-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .type-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .type-btn:hover {
            border-color: #667eea;
        }

        .type-btn.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .preview-area {
            text-align: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        #qrcode {
            display: inline-block;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-block {
            display: block;
            width: 100%;
            margin: 10px 0;
        }

        .color-picker {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-picker input[type="color"] {
            width: 60px;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }

        /* 📱 移动端适配 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header h1 { font-size: 1.8em; }
            .header p { font-size: 0.95em; }
            .main-content { padding: 15px; }
            .upload-area { padding: 40px 15px; }
            .upload-icon { font-size: 3em; }
            .btn { padding: 12px 20px; font-size: 14px; }
            .btn-block { padding: 14px; }
            .control-group input, .control-group select, .control-group textarea { font-size: 16px; padding: 12px; }
            .preview-container, .preview-grid { grid-template-columns: 1fr !important; }
            .stats { grid-template-columns: 1fr 1fr; }
            .format-selector, .grid-selector, .type-selector { flex-wrap: wrap; }
            .format-btn, .grid-btn, .type-btn { padding: 12px 20px; font-size: 14px; }
        }
        @media (max-width: 480px) {
            .header h1 { font-size: 1.5em; }
            .upload-area { padding: 30px 10px; }
            .btn { padding: 10px 16px; font-size: 13px; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="../../index.html" class="back-btn">← 返回工具箱</a>
            <h1>📱 二维码生成器</h1>
            <p>一键生成二维码 - 网址/文本/WiFi/名片</p>
        </div>

        <div class="main-content">
            <div class="type-selector">
                <button class="type-btn active" onclick="selectType('url')">🔗 网址</button>
                <button class="type-btn" onclick="selectType('text')">📝 文本</button>
                <button class="type-btn" onclick="selectType('wifi')">📶 WiFi</button>
                <button class="type-btn" onclick="selectType('email')">📧 邮箱</button>
                <button class="type-btn" onclick="selectType('tel')">📞 电话</button>
            </div>

            <!-- 网址输入 -->
            <div id="url-input" class="input-group">
                <label>网址链接 🌐</label>
                <input type="url" id="urlInput" placeholder="example.com 或 https://example.com" oninput="generateQR()" autocomplete="url">
                <p style="font-size: 12px; color: #666; margin-top: 5px;">💡 扫码后自动使用默认浏览器打开，支持 http/https</p>
            </div>

            <!-- 文本输入 -->
            <div id="text-input" class="input-group" style="display: none;">
                <label>文本内容</label>
                <textarea id="textInput" placeholder="输入要编码的文本内容" oninput="generateQR()"></textarea>
            </div>

            <!-- WiFi 输入 -->
            <div id="wifi-input" class="input-group" style="display: none;">
                <label>WiFi 名称 (SSID)</label>
                <input type="text" id="wifiSsid" placeholder="MyWiFi" oninput="generateQR()">
                <label style="margin-top: 10px;">WiFi 密码</label>
                <input type="text" id="wifiPassword" placeholder="12345678" oninput="generateQR()">
                <label style="margin-top: 10px;">加密方式</label>
                <select id="wifiType" onchange="generateQR()">
                    <option value="WPA">WPA/WPA2</option>
                    <option value="WEP">WEP</option>
                    <option value="nopass">无密码</option>
                </select>
            </div>

            <!-- 邮箱输入 -->
            <div id="email-input" class="input-group" style="display: none;">
                <label>邮箱地址</label>
                <input type="email" id="emailInput" placeholder="test@example.com" oninput="generateQR()">
                <label style="margin-top: 10px;">邮件主题</label>
                <input type="text" id="emailSubject" placeholder="主题" oninput="generateQR()">
                <label style="margin-top: 10px;">邮件内容</label>
                <textarea id="emailBody" placeholder="正文内容" oninput="generateQR()"></textarea>
            </div>

            <!-- 电话输入 -->
            <div id="tel-input" class="input-group" style="display: none;">
                <label>电话号码</label>
                <input type="tel" id="telInput" placeholder="13800138000" oninput="generateQR()">
            </div>

            <h3 style="margin: 30px 0 15px;">⚙️ 样式设置</h3>
            <div class="settings-grid">
                <div class="input-group">
                    <label>尺寸 (px)</label>
                    <select id="qrSize" onchange="generateQR()">
                        <option value="200">200×200</option>
                        <option value="300">300×300</option>
                        <option value="400" selected>400×400</option>
                        <option value="512">512×512</option>
                        <option value="800">800×800</option>
                        <option value="1000">1000×1000</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>容错率</label>
                    <select id="errorLevel" onchange="generateQR()">
                        <option value="L">L (7%)</option>
                        <option value="M" selected>M (15%)</option>
                        <option value="Q">Q (25%)</option>
                        <option value="H">H (30%)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>二维码颜色</label>
                    <div class="color-picker">
                        <input type="color" id="colorDark" value="#000000" onchange="generateQR()">
                        <span>前景色</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>背景颜色</label>
                    <div class="color-picker">
                        <input type="color" id="colorLight" value="#ffffff" onchange="generateQR()">
                        <span>背景色</span>
                    </div>
                </div>
            </div>

            <div class="preview-area">
                <div id="qrcode"></div>
                <p style="margin-top: 15px; color: #666;">扫码预览</p>
            </div>

            <button class="btn btn-success btn-block" onclick="downloadQR()">💾 下载二维码</button>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let currentType = 'url';
        let qrCode = null;

        function selectType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 隐藏所有输入
            ['url', 'text', 'wifi', 'email', 'tel'].forEach(t => {
                document.getElementById(t + '-input').style.display = 'none';
            });

            // 显示当前输入
            document.getElementById(type + '-input').style.display = 'block';
            generateQR();
        }

        function getContent() {
            switch(currentType) {
                case 'url':
                    let url = document.getElementById('urlInput').value || 'https://example.com';
                    // 自动添加协议头，确保扫码后能正确打开
                    if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
                        url = 'https://' + url;
                        document.getElementById('urlInput').value = url;
                    }
                    return url;
                case 'text':
                    return document.getElementById('textInput').value || 'Hello World';
                case 'wifi':
                    const ssid = document.getElementById('wifiSsid').value || 'MyWiFi';
                    const password = document.getElementById('wifiPassword').value || '';
                    const type = document.getElementById('wifiType').value;
                    return `WIFI:T:${type};S:${ssid};P:${password};;`;
                case 'email':
                    const email = document.getElementById('emailInput').value || 'test@example.com';
                    const subject = document.getElementById('emailSubject').value || '';
                    const body = document.getElementById('emailBody').value || '';
                    return `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                case 'tel':
                    return 'tel:' + (document.getElementById('telInput').value || '13800138000');
                default:
                    return 'https://example.com';
            }
        }

        function generateQR() {
            const content = getContent();
            const size = parseInt(document.getElementById('qrSize').value);
            const colorDark = document.getElementById('colorDark').value;
            const colorLight = document.getElementById('colorLight').value;
            const correctLevel = QRCode.CorrectLevel[document.getElementById('errorLevel').value];

            document.getElementById('qrcode').innerHTML = '';
            
            qrCode = new QRCode(document.getElementById('qrcode'), {
                text: content,
                width: size,
                height: size,
                colorDark: colorDark,
                colorLight: colorLight,
                correctLevel: correctLevel
            });
        }

        function downloadQR() {
            const qrDiv = document.getElementById('qrcode');
            const img = qrDiv.querySelector('img');
            
            if (!img || !img.src) {
                // 等待 canvas 生成
                const canvas = qrDiv.querySelector('canvas');
                if (canvas) {
                    downloadFromCanvas(canvas);
                } else {
                    alert('请先生成二维码');
                }
                return;
            }

            const a = document.createElement('a');
            a.href = img.src;
            a.download = `qrcode_${Date.now()}.png`;
            a.click();
        }

        function downloadFromCanvas(canvas) {
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = `qrcode_${Date.now()}.png`;
            a.click();
        }

        // 初始化
        generateQR();
    </script>
</body>
</html>
