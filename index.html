<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>许先生的工具箱</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <div class="container">
                <h1 class="site-title">🧰 许先生的工具箱</h1>
                <p class="site-slogan">实用小工具，让工作更高效</p>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <section class="intro">
                    <h2>欢迎访问</h2>
                    <p>这里收集了日常工作中实用的在线小工具，全部在浏览器中运行，无需安装，即开即用。</p>
                </section>

                <section class="tools-grid">
                    <h2 class="section-title">可用工具</h2>
                    <div class="tools-list">
                        <!-- 工具 1: 述职抽签工具箱 -->
                        <a href="tools/presentation-lottery/index.html" class="tool-card">
                            <div class="tool-icon">🎲</div>
                            <h3 class="tool-name">述职抽签工具箱</h3>
                            <p class="tool-desc">随机抽签工具，适用于述职顺序、任务分配等场景</p>
                            <span class="tool-status">可用</span>
                        </a>

                        <!-- 工具 2: 图片拼接工具 -->
                        <a href="tools/image-stitching/index.html" class="tool-card">
                            <div class="tool-icon">🖼️</div>
                            <h3 class="tool-name">图片拼接工具</h3>
                            <p class="tool-desc">将多张图片横向或纵向拼接成一张长图</p>
                            <span class="tool-status">可用</span>
                        </a>

                        <!-- 工具 3: 全屏倒计时 -->
                        <a href="tools/fullscreen-countdown/index.html" class="tool-card">
                            <div class="tool-icon">⏱️</div>
                            <h3 class="tool-name">全屏倒计时</h3>
                            <p class="tool-desc">全屏专注倒计时，支持自定义时间、进度圆环、自动全屏</p>
                            <span class="tool-status">可用</span>
                        </a>
                    </div>
                </section>

                <section class="coming-soon">
                    <h2 class="section-title">更多工具开发中</h2>
                    <p>如果你有想要的工具功能，欢迎提出建议！</p>
                </section>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 许先生的工具箱 · Powered by GitHub Pages</p>
            </div>
        </footer>
    </div>
</body>
</html>
